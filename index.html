<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matcha & Crumbs | Artisan Cookies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Matcha & Crumbs (抹茶とパン粉)</h1>
            <p>Japanese-Inspired Artisan Cookies</p>
        </div>
    </header>

    <main>
        <section class="menu-section">
            <h2>Our Classic Selection</h2>
            <div class="cookie-grid">
                
                <div class="cookie-card">
                    <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?auto=format&fit=crop&w=400&q=80" alt="Classic Choco Chip">
                    <h3>Classic Choco Chip</h3>
                    <p class="price">$3.00</p>
                    <button class="order-btn" onclick="addToCart('Classic Choco Chip')">Add to Cart</button>
                </div>

                <div class="cookie-card">
                    <img src="https://images.unsplash.com/photo-1605666807755-14fdbfa393eb?auto=format&fit=crop&w=400&q=80" alt="Triple Chocolate">
                    <h3>Triple Chocolate</h3>
                    <p class="price">$3.50</p>
                    <button class="order-btn" onclick="addToCart('Triple Chocolate')">Add to Cart</button>
                </div>

                <div class="cookie-card">
                    <img src="https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&w=400&q=80" alt="Biscoff">
                    <h3>Biscoff</h3>
                    <p class="price">$3.50</p>
                    <button class="order-btn" onclick="addToCart('Biscoff')">Add to Cart</button>
                </div>

                <div class="cookie-card">
                    <img src="https://images.unsplash.com/photo-1620986518118-2e00e84b7274?auto=format&fit=crop&w=400&q=80" alt="Red Velvet">
                    <h3>Red Velvet</h3>
                    <p class="price">$4.00</p>
                    <button class="order-btn" onclick="addToCart('Red Velvet')">Add to Cart</button>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
